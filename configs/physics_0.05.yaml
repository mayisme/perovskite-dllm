# 物理损失实验配置 - 温和启用 (weight=0.05)
# 适用场景：初步探索物理约束对生成质量的影响

# 数据配置
data:
  raw_data_path: "data/raw/perovskites_full.json"
  processed_data_path: "data/processed/perovskites_20k_relaxed.h5"
  split_ratios: [0.8, 0.1, 0.1]
  batch_size: 16
  num_workers: 2
  augment: true
  energy_threshold: 1.0
  max_atoms: 30
  skip_topology: true
  skip_coordination: true
  skip_oxidation: true
  skip_dedup: true
  seed: 42

# 模型配置
model:
  hidden_dim: 128
  n_egnn_layers: 3
  n_transformer_layers: 2
  cutoff_radius: 6.0
  n_atom_types: 100
  num_heads: 4
  dropout: 0.1

# 扩散配置
diffusion:
  timesteps: 500
  schedule_type: "cosine"
  prediction_type: "epsilon"

# 训练配置
training:
  epochs: 50
  lr: 1.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  val_frequency: 5
  checkpoint_frequency: 10
  early_stopping_patience: 15
  device: "cpu"
  use_wandb: false
  physics_loss_weight: 0.05  # 温和启用

# 物理损失权重（相对权重，会乘以 physics_loss_weight）
physics_loss:
  goldschmidt: 0.1      # Goldschmidt容忍因子约束
  coordination: 0.05    # 配位数约束
  bond_length: 0.03     # 键长约束
  pauli: 0.1            # Pauli排斥约束

# 生成配置
generation:
  num_samples: 100
  sampling_steps: 100
  sampler: "ddpm"
  guidance_scale: 3.0
  temperature: 1.0

# 验证配置
validation:
  min_distance: 1.5
  goldschmidt_range: [0.8, 1.0]
  coordination_tolerance: 0.5
  use_ml_potential: false
  ml_potential_type: "chgnet"
  use_dft: false
  dft_top_k: 10
