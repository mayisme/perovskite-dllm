# 快速验证版本 - lr=5e-5 + warmup + cosine decay
# 用于快速测试配置是否正确（10 epochs, 小batch）

# 数据配置
data:
  raw_data_path: "data/raw/perovskites_full.json"
  processed_data_path: "data/processed/perovskites_20k_relaxed.h5"
  split_ratios: [0.8, 0.1, 0.1]
  batch_size: 8  # 减小batch size
  num_workers: 2
  augment: true
  energy_threshold: 1.0
  max_atoms: 30
  skip_topology: true
  skip_coordination: true
  skip_oxidation: true
  skip_dedup: true
  seed: 42

# 模型配置
model:
  hidden_dim: 128
  n_egnn_layers: 3
  n_transformer_layers: 2
  cutoff_radius: 6.0
  n_atom_types: 100
  num_heads: 4
  dropout: 0.1

# 扩散配置
diffusion:
  timesteps: 500
  schedule_type: "cosine"
  prediction_type: "epsilon"

# 训练配置 - 快速验证版本
training:
  epochs: 10  # 减少到10 epochs
  lr: 5.0e-5
  lr_scheduler: "cosine"
  warmup_steps: 100  # 减少warmup steps
  weight_decay: 0.01
  grad_clip: 1.0
  val_frequency: 2  # 更频繁的验证
  checkpoint_frequency: 5
  early_stopping_patience: 5
  device: "cpu"
  use_wandb: false
  physics_loss_weight: 0.0

# 物理损失权重
physics_loss:
  goldschmidt: 0.1
  coordination: 0.05
  bond_length: 0.03
  pauli: 0.1

# 生成配置
generation:
  num_samples: 10  # 减少生成样本数
  sampling_steps: 50  # 减少采样步数
  sampler: "ddpm"
  guidance_scale: 3.0
  temperature: 1.0

# 验证配置
validation:
  min_distance: 1.5
  goldschmidt_range: [0.8, 1.0]
  coordination_tolerance: 0.5
  use_ml_potential: false
  ml_potential_type: "chgnet"
  use_dft: false
  dft_top_k: 10
